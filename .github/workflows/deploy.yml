name: Deploy via Plesk Webhook

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Plesk to pull
        # Plesk webhook (server4.hispeed16.com) zieht automatisch den Code
        # via Deploy Key. Wir warten kurz, dann triggern wir den Passenger-Restart.
        run: sleep 20

      - name: Trigger Passenger restart + auto-build
        # Berührt tmp/restart.txt → Passenger startet neu → server.js erkennt
        # FETCH_HEAD > BUILD_ID → führt npm run build aus → neue Version live.
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://ladyfitness-bremgarten.ch/api/internal/redeploy \
            -H "Content-Type: application/json" \
            -d "{\"secret\": \"${{ secrets.DEPLOY_SECRET }}\"}")
          echo "Redeploy response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warnung: Redeploy-Endpoint nicht erreichbar (HTTP $STATUS). Evtl. manuell restart.txt berühren."
            exit 1
          fi
