# Lokale MariaDB nur für Entwicklung (Docker).
# Start:  docker compose up -d
# Stop:   docker compose down
# Daten:  Volume mariadb_data (bleibt erhalten bis "docker compose down -v")
#
# studio-booking/.env → DATABASE_URL für Prisma migrate dev (Shadow-DB):
# mysql://root:root_dev_only_local@127.0.0.1:3306/ladyfitness_local
# (Benutzer ladyfitness_* hat oft kein CREATE DATABASE — Root nur lokal.)

services:
  mariadb:
    image: mariadb:11
    container_name: ladyfitness-mariadb-local
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_dev_only_local
      MYSQL_DATABASE: ladyfitness_local
      MYSQL_USER: ladyfitness
      MYSQL_PASSWORD: ladyfitness_dev
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
